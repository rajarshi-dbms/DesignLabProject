version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://mudra_user:mudra_password@db:5432/mudra_db
      - SECRET_KEY=your-secret-key-change-in-production
    depends_on:
      - db
    volumes:
      - ../backend:/app
      - uploads:/app/uploads

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  db:
    image: postgres:13
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=mudra_db
      - POSTGRES_USER=mudra_user
      - POSTGRES_PASSWORD=mudra_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  uploads:
